---
- name: Deploy Authorization Service
  hosts: k3s_server
  become: true
  gather_facts: false
  tasks:
    - name: Apply Authorization Service workload
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - apply
          - -f
          - "-"
        stdin: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: auth-service
            namespace: app
            labels:
              app.kubernetes.io/name: auth-service
          spec:
            replicas: {{ auth_service_replicas }}
            selector:
              matchLabels:
                app.kubernetes.io/name: auth-service
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: auth-service
              spec:
                containers:
                  - name: auth-service
                    image: {{ auth_service_image }}
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: http
                        containerPort: 8080
                    env:
                      - name: ASPNETCORE_ENVIRONMENT
                        value: Production
                      - name: ASPNETCORE_URLS
                        value: http://+:8080
                    readinessProbe:
                      httpGet:
                        path: /api/auth/health/ready
                        port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /api/auth/health/live
                        port: http
                      initialDelaySeconds: 15
                      periodSeconds: 20
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: auth-service
            namespace: app
            labels:
              app.kubernetes.io/name: auth-service
          spec:
            selector:
              app.kubernetes.io/name: auth-service
            ports:
              - name: http
                port: 80
                targetPort: http
      register: auth_service_apply
      changed_when: "'created' in auth_service_apply.stdout or 'configured' in auth_service_apply.stdout"

    - name: Wait for Authorization Service rollout
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - app
          - rollout
          - status
          - deployment/auth-service
          - --timeout=180s
      changed_when: false

    - name: Check Authorization Service endpoint in cluster
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - app
          - get
          - endpoints
          - auth-service
      register: auth_service_endpoints
      changed_when: false

    - name: Print Authorization Service endpoints
      ansible.builtin.debug:
        var: auth_service_endpoints.stdout_lines
