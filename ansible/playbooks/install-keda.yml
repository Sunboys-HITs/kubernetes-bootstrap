---
- name: Install KEDA autoscaler
  hosts: k3s_server
  become: true
  gather_facts: false
  tasks:
    - name: Check Helm is installed
      ansible.builtin.command:
        argv:
          - helm
          - version
          - --short
      changed_when: false

    - name: Add official KEDA Helm repository
      ansible.builtin.command:
        argv:
          - helm
          - repo
          - add
          - kedacore
          - https://kedacore.github.io/charts
          - --force-update
      register: keda_repo
      changed_when: "'has been added' in keda_repo.stdout or 'has been updated' in keda_repo.stdout"

    - name: Render pinned KEDA chart
      ansible.builtin.command:
        argv:
          - helm
          - template
          - keda
          - kedacore/keda
          - --version
          - "{{ keda_chart_version }}"
          - --namespace
          - "{{ keda_namespace }}"
          - --include-crds
      changed_when: false

    - name: Install pinned KEDA chart
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - keda
          - kedacore/keda
          - --version
          - "{{ keda_chart_version }}"
          - --namespace
          - "{{ keda_namespace }}"
          - --create-namespace
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - --wait
          - --timeout
          - 5m
      register: keda_install
      changed_when: "'has been upgraded' in keda_install.stdout or 'has been installed' in keda_install.stdout"

    - name: Verify KEDA operator rollout
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - "{{ keda_namespace }}"
          - rollout
          - status
          - deployment/keda-operator
          - --timeout=180s
      changed_when: false
