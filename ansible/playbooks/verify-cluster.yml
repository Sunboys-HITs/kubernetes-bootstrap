---
- name: Verify k3s cluster
  hosts: k3s_server
  become: true
  gather_facts: false
  vars:
    expected_k3s_node_count: "{{ groups[k3s_server_group] | length + groups[k3s_agent_group] | length }}"
  tasks:
    - name: Show Kubernetes cluster info
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - cluster-info
      register: cluster_info
      changed_when: false

    - name: Print Kubernetes cluster info
      ansible.builtin.debug:
        var: cluster_info.stdout_lines

    - name: Show Kubernetes nodes
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - get
          - nodes
          - -o
          - wide
      register: cluster_nodes
      changed_when: false

    - name: Print Kubernetes nodes
      ansible.builtin.debug:
        var: cluster_nodes.stdout_lines

    - name: Check expected Kubernetes node count
      ansible.builtin.assert:
        that:
          - cluster_nodes.stdout_lines[1:] | length == expected_k3s_node_count | int
        fail_msg: "Expected {{ expected_k3s_node_count }} Kubernetes nodes from inventory, got {{ cluster_nodes.stdout_lines[1:] | length }}."
        success_msg: "All {{ expected_k3s_node_count }} Kubernetes nodes from inventory are registered."

    - name: Check required namespaces
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - get
          - namespace
          - "{{ item }}"
      register: namespace_checks
      changed_when: false
      loop: "{{ cluster_namespaces }}"

    - name: Print required namespaces
      ansible.builtin.debug:
        msg: "{{ namespace_checks.results | map(attribute='stdout') | list }}"

    - name: Show kube-system pods
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - kube-system
          - get
          - pods
      register: kube_system_pods
      changed_when: false

    - name: Print kube-system pods
      ansible.builtin.debug:
        var: kube_system_pods.stdout_lines

    - name: Show API ingresses
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - "{{ ingress_namespace }}"
          - get
          - ingress
          - "{{ public_ingress_name }}"
          - "{{ protected_ingress_name }}"
          - -o
          - wide
      register: api_ingress
      changed_when: false

    - name: Print API ingress
      ansible.builtin.debug:
        var: api_ingress.stdout_lines

    - name: Show ForwardAuth middleware
      ansible.builtin.command:
        argv:
          - /usr/local/bin/kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - "{{ ingress_namespace }}"
          - get
          - "middlewares.{{ traefik_crd_api_group }}"
          - "{{ forward_auth_middleware_name }}"
      changed_when: false
